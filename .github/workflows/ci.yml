name: FuviAI CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  ANTHROPIC_MODEL: "claude-sonnet-4-6"

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # JOB 1: Lint & Type Check
  # ═══════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Run Ruff (linter + formatter check)
        run: ruff check backend/ tests/ --select=E,F,W,I --ignore=E501

      - name: Run Ruff format check
        run: ruff format --check backend/ tests/

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2: Tests
  # ═══════════════════════════════════════════════════════════════════
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov pytest-xdist

      - name: Create .env for tests
        run: |
          cat > .env << 'EOF'
          ANTHROPIC_API_KEY=sk-ant-test-key-for-ci
          ANTHROPIC_MODEL=claude-sonnet-4-6
          DATABASE_URL=postgresql://fuviai:password@localhost:5432/fuviai_test
          REDIS_URL=redis://localhost:6379/0
          CHROMA_PERSIST_DIR=./data/chroma_test
          APP_ENV=test
          LOG_LEVEL=WARNING
          ALLOWED_ORIGINS=http://localhost:3000
          EOF

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -n auto \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3: Build Docker Image
  # ═══════════════════════════════════════════════════════════════════
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: fuviai/marketing-agent
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}

  # ═══════════════════════════════════════════════════════════════════
  # JOB 4: Deploy to VPS (Production)
  # ═══════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            cd /opt/fuviai-marketing-agent

            # Pull latest image
            docker pull fuviai/marketing-agent:latest

            # Rolling restart (zero downtime)
            docker compose pull
            docker compose up -d --no-deps --build app
            docker compose restart nginx

            # Health check
            sleep 10
            curl -f http://localhost:8000/health || exit 1

            # Cleanup old images
            docker image prune -f

            echo "Deploy completed at $(date)"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deploy thành công lên marketing.fuviai.com"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deploy thất bại! Check logs."
