services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fuviai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketing_agent
      POSTGRES_USER: fuviai
      POSTGRES_PASSWORD: fuviai_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuviai -d marketing_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fuviai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI App ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: fuviai/marketing-agent:latest
    container_name: fuviai_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fuviai:fuviai_password_2026@postgres:5432/marketing_agent
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: fuviai/marketing-agent:latest
    container_name: fuviai_celery_worker
    restart: unless-stopped
    command: celery -A backend.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fuviai:fuviai_password_2026@postgres:5432/marketing_agent
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ─── Celery Beat (Scheduler) ──────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: fuviai/marketing-agent:latest
    container_name: fuviai_celery_beat
    restart: unless-stopped
    command: celery -A backend.tasks.celery_app beat --loglevel=info --schedule=/app/data/celerybeat-schedule
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fuviai:fuviai_password_2026@postgres:5432/marketing_agent
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fuviai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://app:8000
    depends_on:
      - app

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fuviai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
