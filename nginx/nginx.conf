worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=heavy:10m rate=10r/m;

    # Upstream FastAPI
    upstream fuviai_backend {
        server app:8000;
        keepalive 32;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name marketing.fuviai.com;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS Server
    server {
        listen 443 ssl http2;
        server_name marketing.fuviai.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://fuviai_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Heavy AI endpoints — stricter rate limit + longer timeout
        location ~ ^/api/commerce/orchestrate/ {
            limit_req zone=heavy burst=3 nodelay;

            proxy_pass         http://fuviai_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Connection "";
            proxy_read_timeout 360s;
            proxy_send_timeout 360s;

            # SSE support
            proxy_buffering    off;
            proxy_cache        off;
        }

        # Health check (no rate limit)
        location /health {
            proxy_pass http://fuviai_backend;
            access_log off;
        }

        # Docs
        location /docs {
            proxy_pass http://fuviai_backend;
        }

        location /openapi.json {
            proxy_pass http://fuviai_backend;
        }
    }
}
