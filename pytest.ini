[pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (mock Claude API)
    e2e: End-to-end tests (requires real API key)
    slow: Slow tests (> 5s)

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
